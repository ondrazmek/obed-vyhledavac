<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vyhledávač obědů</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 1rem; max-width: 600px; margin: 0 auto; }
    #search-box { position: relative; margin-bottom: 1rem; }
    #search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; }
    #dotaz { width: 100%; padding: 12px 12px 12px 40px; font-size: 16px; border: 1px solid #ddd; border-radius: 12px; background: #fff; outline: none; -webkit-appearance: none; }
    #dotaz:focus { border-color: #999; }
    #loader { display: none; text-align: center; padding: 2rem 0; color: #aaa; font-size: 14px; }
    #vysledky { display: flex; flex-direction: column; gap: 12px; }
    .karta { background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
    .karta img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .karta-no-img { width: 100%; height: 220px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 14px; }
    .karta-nazev { font-size: 15px; font-weight: 500; color: #222; padding: 12px; }
    #placeholder { text-align: center; padding: 3rem 0; color: #bbb; font-size: 14px; }
    #loader { display: none; text-align: center; padding: 2rem 0; color: #aaa; font-size: 14px; }
    #loader span { display: inline-block; animation: blik 1.2s infinite; }
    #loader span:nth-child(2) { animation-delay: 0.2s; }
    #loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blik { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="dotaz" placeholder="Zadej název jídla..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div id="loader">Hledám<span>.</span><span>.</span><span>.</span></div>
  <div id="vysledky">
    <div id="placeholder">Začni psát název jídla</div>
  </div>

  <script>
    var API = 'https://script.google.com/macros/s/AKfycbw-3p9B6xhXSAFizbAzfLaMFeG17bwxAaEfL08Z3OS-oxTnWMAbQx47y7VgX7FKNuWe/exec';
    var timer;

    document.getElementById('dotaz').addEventListener('input', function() {
      clearTimeout(timer);
      var dotaz = this.value.trim();
      if (dotaz.length < 2) {
        document.getElementById('vysledky').innerHTML = '<div id="placeholder">Začni psát název jídla</div>';
        document.getElementById('loader').style.display = 'none';
        return;
      }
      document.getElementById('loader').style.display = 'block';
      document.getElementById('vysledky').innerHTML = '';
      timer = setTimeout(function() {
  document.getElementById('dotaz').blur();
  fetch(API + '?q=' + encodeURIComponent(dotaz))
    .then(function(r) { return r.json(); })
    .then(zobraz)
    .catch(function(err) { chyba(err); });
}, 400);
    });

    function zobraz(data) {
      document.getElementById('loader').style.display = 'none';
      var el = document.getElementById('vysledky');
      if (!data || !data.length) {
        el.innerHTML = '<div id="placeholder">Nic nenalezeno</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < data.length; i++) {
        var d = data[i];
        var img = d.url
          ? '<img src="' + d.url + '" alt="' + d.nazev + '" loading="lazy">'
          : '<div class="karta-no-img">Bez fotky</div>';
        html += '<div class="karta">' + img + '<div class="karta-nazev">' + d.nazev + '</div></div>';
      }
      el.innerHTML = html;
    }

    function chyba(err) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('vysledky').innerHTML = '<div id="placeholder">Chyba: ' + err.message + '</div>';
    }
  </script>
</body>
</html>
